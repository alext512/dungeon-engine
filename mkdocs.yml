site_name: Dungeon Engine Docs
site_description: Documentation for the command-driven top-down RPG/puzzle engine and its external area editor.
repo_url: https://github.com/alext512/dungeon-engine
repo_name: alext512/dungeon-engine
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Game Authoring:
      - Start Here: authoring/index.md
      - Install and Run: authoring/install-and-run.md
      - Project Layout: authoring/project-layout.md
      - Engine Concepts: authoring/engine-concepts.md
      - Authoring Workflow: authoring/authoring-workflow.md
      - Command System: authoring/command-system.md
      - Dialogue, Inventory, and UI: authoring/dialogue-inventory-ui.md
      - Startup Checks: authoring/startup-checks.md
      - Editor:
          - Editor Overview: authoring/editor/index.md
          - Full Editor Manual: authoring/editor/editor-manual.md
          - Editor Workflow: authoring/editor/workflow.md
          - Editor Gaps and Future Work: authoring/editor/gaps-and-future-work.md
      - JSON and Command Reference:
          - Overview: authoring/reference/index.md
          - Project Manifest: authoring/reference/project-manifest.md
          - Content Types: authoring/reference/content-types.md
          - Built-in Commands: authoring/reference/builtin-commands.md
          - Runtime Tokens: authoring/reference/runtime-tokens.md
          - Full Authoring Guide: authoring/manuals/authoring-guide.md
          - Full Engine JSON Interface: authoring/manuals/engine-json-interface.md
  - Project Direction:
      - Overview: project/index.md
      - Project Spirit: project/project-spirit.md
      - Architecture Direction: project/architecture-direction.md
      - Editor Vision: project/editor-vision.md
      - Editor Scope: project/editor-scope.md
  - Development:
      - Verification and Validation: development/verification-and-validation.md
      - Runtime Architecture: development/runtime-architecture.md
      - Editor Architecture: development/editor-architecture.md
      - Editor Data Boundary: development/editor-data-boundary.md
      - For Coding Agents: development/for-coding-agents.md
      - Docs Maintenance: development/docs-maintenance.md
      - Publishing: development/publishing.md
